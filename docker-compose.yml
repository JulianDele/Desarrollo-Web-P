version: "3.9"

services:

  backend:
    build: ./Back-end
    container_name: backend_app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - JWT_SECRET=devsecret
      - MONGO_URI=mongodb://mongo:27017/gymdb
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: frontend_app
    ports:
      - "5173:5173"
    depends_on:
      - backend

  mongo:
    image: mongo
    container_name: mongo_db
    ports:
      - "27017:27017"
