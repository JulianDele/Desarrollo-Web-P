version: "3.9"

services:

  backend:
    build: .
    container_name: backend_app
    ports:
      - "3000:3000"
      
    env_file:
      - .env
      - ./Back-end/.env
    depends_on:
      - mongo
      - redis


  mongo:
    image: mongo
    container_name: mongo_db
    ports:
      - "27017:27017"

  redis:
    image: redis
    container_name: redis_cache
    ports:
      - "6379:6379"
