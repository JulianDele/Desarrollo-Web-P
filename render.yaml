services:
  - type: web
    name: desarrollo-web-p-backend
    env: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Set these in Render dashboard (do not commit real secrets):
      - key: JWT_SECRET
        sync: false
      - key: RESET_TOKEN_SECRET
        sync: false
      - key: MONGO_URI
        sync: false
      # Must match the frontend static site URL once created:
      - key: CORS_ORIGIN
        sync: false

  - type: static
    name: desarrollo-web-p-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set to the backend service URL, e.g. https://desarrollo-web-p-backend.onrender.com
      - key: VITE_API_URL
        sync: false
